name: 'RCF Audit'
description: 'Run RCF Protocol Compliance Audit'
inputs:
  license-key:
    description: 'RCF Audit License Key'
    required: true
  path:
    description: 'Path to audit'
    required: false
    default: '.'
outputs:
  report:
    description: 'Path to the generated audit report'
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install RCF CLI from source
      shell: bash
      run: |
        pip install ./sdk/python

    - name: Run RCF Audit
      shell: bash
      env:
        RCF_LICENSE_KEY: ${{ inputs.license-key }}
      run: |
        rcf-cli audit "${{ inputs.path }}"
