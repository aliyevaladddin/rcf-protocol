name: Sovereign Core Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]
  schedule:
    - cron: '25 11 * * 5' # Для CodeQL
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  actions: read
  id-token: write
  attestations: write
  packages: write

jobs:
  # --- STAGE 1: SECURITY & PREFLIGHT ---
  security-scan:
    name: 🛡️ Security Scan (Bearer & Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Bearer Scan
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc
        with:
          api-key: ${{ secrets.BEARER_TOKEN }}
          format: sarif
          output: bearer-results.sarif
          exit-code: 0
          skip-path: "node_modules,dist,build,coverage,EXAMPLES,**/*.test.ts,**/*.spec.ts,sdk/typescript/src/cli,sdk/python/rcf_cli,sdk/typescript/src/core/ComplianceValidator.ts,sdk/python/rcf_cli/cli.py,sdk/typescript/src/core/MarkerParser.ts"
          
      - name: Snyk Setup
        uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code Test
        run: |
          snyk code test --sarif > snyk-code.sarif || true
          if [ ! -s snyk-code.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk Code"}},"results":[]}]}' > snyk-code.sarif
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Security Reports
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bearer-results.sarif
          category: bearer

      - name: Upload Snyk Report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk

  codeql-analysis:
    name: 🔍 CodeQL Advanced Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript', 'python' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  # --- STAGE 2: BUILD & TEST ---
  test-typescript:
    name: 📦 TypeScript CI
    needs: [security-scan, codeql-analysis]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install & Test
        working-directory: ./sdk/typescript
        run: |
          npm ci --legacy-peer-deps
          npm test

  test-python:
    name: 🐍 Python CI
    needs: [security-scan, codeql-analysis]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Build TypeScript SDK (required for cross-lang normalizer tests)
        working-directory: ./sdk/typescript
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install & Test
        working-directory: ./sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install pytest build
          pip install -e .
          pytest tests/

  test-rust:
    name: 🦀 Rust CI
    needs: [security-scan, codeql-analysis]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        working-directory: ./sdk/rust
        run: cargo fmt --check

      - name: Clippy
        working-directory: ./sdk/rust
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: ./sdk/rust
        run: cargo test

      - name: Build
        working-directory: ./sdk/rust
        run: cargo build --release

      - name: Security audit
        working-directory: ./sdk/rust
        run: |
          cargo install cargo-audit
          cargo audit

  # --- STAGE 3: COMPLIANCE AUDIT ---
  rcf-audit:
    name: ⚖️ RCF Compliance Audit
    needs: [test-typescript, test-python, test-rust]
    runs-on: ubuntu-latest
    # Dependabot PRs run with a restricted token and CANNOT read secrets
    # (RCF_LICENSE_KEY is empty there), so the premium `audit` gate would always
    # fail on them — a missing-secret failure, not a compliance violation. Skip
    # the gate for the bot; it still runs on every human PR and on push.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
      - name: Run RCF Audit
        uses: ./.github/actions/rcf-audit
        with:
          license-key: ${{ secrets.RCF_LICENSE_KEY }}
          path: '.'
      - name: Upload Audit Report
        uses: actions/upload-artifact@v7
        with:
          name: rcf-audit-report
          path: RCF-AUDIT-REPORT.json

