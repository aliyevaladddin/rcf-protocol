name: RCF Compliance Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  rcf-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify License Key
        shell: bash
        run: |
          if [ -z "${{ secrets.RCF_LICENSE_KEY }}" ]; then
            echo "❌ ERROR: RCF_LICENSE_KEY is not set in GitHub Secrets!"
            exit 1
          else
            echo "✅ RCF_LICENSE_KEY is found."
          fi

      - name: Run RCF Audit
        uses: ./.github/actions/rcf-audit
        with:
          license-key: ${{ secrets.RCF_LICENSE_KEY }}
          path: '.'

      - name: Upload Audit Report
        uses: actions/upload-artifact@v7
        with:
          name: rcf-audit-report
          path: RCF-AUDIT-REPORT.json
