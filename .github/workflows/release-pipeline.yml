name: Sovereign Release & Deploy

on:
  release:
    types: [created]

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  publish-pypi:
    name: 🚀 Publish PyPI & Attest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Build
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
      - name: Generate build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'sdk/python/dist/*'
      - name: Publish to PyPI
        working-directory: sdk/python
        run: python -m twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: sdk/python/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: 🚀 Publish NPM & Attest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install & Publish
        working-directory: sdk/typescript
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "ERROR: NPM_API_TOKEN is empty! Check your GitHub Secrets."
            exit 1
          fi
          npm config set //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          npm ci --legacy-peer-deps
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}
