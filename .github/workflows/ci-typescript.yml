name: TypeScript CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'sdk/typescript/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'sdk/typescript/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: './sdk/typescript/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./sdk/typescript
      run: npm ci
      
    - name: Run tests
      working-directory: ./sdk/typescript
      run: npm run test
