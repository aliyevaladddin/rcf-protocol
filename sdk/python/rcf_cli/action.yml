name: 'RCF Ghost Shield'
description: 'Enforces RCF Ghost Protocol v2.0 — blocks PRs that remove protected markers or tamper with audited files.'
author: 'Aladdin Aliyev <aladdin@aliyev.site>'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Root path to scan (relative to repo root)'
    required: false
    default: '.'
  mode:
    description: 'Check mode: "diff" (markers only, fast) or "verify" (full hash check, strict)'
    required: false
    default: 'diff'
  fail-on-new-unprotected:
    description: 'Fail if new files with unprotected logic are detected (no audit record)'
    required: false
    default: 'false'
  rcf-version:
    description: 'Expected RCF protocol version'
    required: false
    default: '2.0'
  license-key:
    description: 'RCF audit license key (required for verify mode)'
    required: false
    default: ''

outputs:
  violations:
    description: 'Number of compliance violations found'
    value: ${{ steps.rcf-check.outputs.violations }}
  status:
    description: '"passed" or "failed"'
    value: ${{ steps.rcf-check.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install rcf-ghost-shield
      shell: bash
      run: pip install rcf-ghost-shield --quiet || echo "rcf-ghost-shield not on PyPI yet, using local path if available"

    - name: Check audit report exists
      shell: bash
      id: audit-check
      run: |
        REPORT="${{ inputs.path }}/RCF-AUDIT-REPORT.json"
        if [ ! -f "$REPORT" ]; then
          echo "::error::RCF-AUDIT-REPORT.json not found at '$REPORT'."
          echo "::error::Run 'rcf-cli audit .' locally and commit the report first."
          exit 1
        fi
        echo "report_path=$REPORT" >> $GITHUB_OUTPUT

    - name: Run RCF compliance check
      shell: bash
      id: rcf-check
      env:
        RCF_LICENSE_KEY: ${{ inputs.license-key }}
        PYTHONPATH: ${{ github.action_path }}
      run: |
        set +e
        MODE="${{ inputs.mode }}"
        PATH_ARG="${{ inputs.path }}"
        VIOLATIONS=0

        echo "::group::RCF Guardian — mode: $MODE"

        # Using the script directly from the action path as fallback if pip install fails
        CLI_EXEC="rcf-ghost-shield"
        if ! command -v rcf-ghost-shield &> /dev/null; then
          CLI_EXEC="python3 ${{ github.action_path }}/cli.py"
        fi

        if [ "$MODE" = "verify" ]; then
          $CLI_EXEC verify "$PATH_ARG" --verbose
          EXIT_CODE=$?
        else
          $CLI_EXEC diff "$PATH_ARG" --verbose
          EXIT_CODE=$?
        fi

        echo "::endgroup::"

        if [ $EXIT_CODE -ne 0 ]; then
          VIOLATIONS=1
          echo "violations=1" >> $GITHUB_OUTPUT
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "::error::RCF compliance check FAILED. Protected markers were removed or files were tampered with."
          exit 1
        else
          echo "violations=0" >> $GITHUB_OUTPUT
          echo "status=passed" >> $GITHUB_OUTPUT
          echo "RCF compliance check passed."
        fi
