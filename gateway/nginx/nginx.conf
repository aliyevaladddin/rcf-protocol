# RCF Gateway Nginx WAF Configuration Snippet
# Add this to your nginx.conf to protect your codebase routes.

# Define the shared memory dictionary for WAF rate limiting
lua_shared_dict rcf_limit 10m;

server {
    listen 80;
    server_name yourdomain.com;

    location / {
        # Execute the RCF WAF Lua script on every request
        access_by_lua_file /etc/nginx/rcf_waf.lua;

        # Your normal backend configuration here...
        # proxy_pass http://localhost:8080;
    }
}
